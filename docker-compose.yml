services:
  postgres:
    image: postgres:16
    container_name: bd_snowflake_postgres
    environment:
      POSTGRES_DB: bd_snowflake
      POSTGRES_USER: bd_user
      POSTGRES_PASSWORD: bd_password
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./исходные данные:/data:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bd_user -d bd_snowflake"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
